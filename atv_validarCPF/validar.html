<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validar CPF</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

            <div id="mensagem"></div>

        </div>

    </div>

    <script src=".js"></script>

</body>
</html>
